<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
    <title>Projects | Nazarite Digital Solutions | Web Developer in Durban, South Africa</title>
    <meta name="description" content="Explore website design and development projects from Nazarite Digital Solutions, showcasing responsive, user-friendly websites built for businesses in South Africa and beyond.">
    <link rel="canonical" href="https://www.nazaritedigitalsolutions.vercel.app/projects">
    
    <meta name="robots" content="index, follow">

    <meta name="author" content="Nazarite Digital Solutions">
    
    <link rel="icon" type="image/svg+xml" href="favicon-nazarite-digital-solutions.svg">
    <link rel="stylesheet" href="header-css.css">
  
    <style>
      *, 
      *::before, 
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, 
      body {
        width: 100%;
        min-height: 100vh;
        background: linear-gradient(to bottom, white 0%, #006400 60%, #00006D 80%);
      }

      /* ---------- HEADER ---------- */
      
      .site-header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 5rem;
        z-index: 200;
        background: transparent;
        display: flex;
        align-items: center;
        padding: 0 3vw;
      }

      /* ---------- PROJECTS PAGE WRAPPER ---------- */
      
      .projects-page-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding-top: 7rem;
        padding-bottom: 0;
      }

      /* ── Section heading ── */
      
      .projects-page-heading {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 2.8rem;
        font-weight: 700;
        color: #00006D;
        text-align: center;
        letter-spacing: 0.04em;
        margin-bottom: 3rem;
        padding: 0 1rem;
      }

      /* ---------- CARDS ROW ---------- */
    
      .cards-row {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: stretch;
        gap: 2rem;
        width: 90%;
        max-width: 1100px;
        margin-bottom: 3rem;
      }

      /* ---------- INDIVIDUAL CARD ---------- */
    
      .project-card {
        flex: 1;
        display: flex;
        flex-direction: column;
        border: 1px solid white;
        border-radius: 0.5rem;
        overflow: hidden;
        background: white;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      
      .project-card-link {
        text-decoration: none;
        color: inherit;
        display: flex;
        flex: 1;
      }

      /* ---------- CARD IMAGE ---------- */
      
      .card-image-wrap {
        flex: 1 1 auto;
        width: 100%;
        overflow: hidden;
      }

      .card-image-wrap picture,
      .card-image-wrap img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* ---------- CARD FOOTER ---------- */
    
      .card-footer {
        background: #00006D;
        padding: 0.85rem 1rem;
        text-align: center;
        flex-shrink: 0;
      }

      .card-footer span {
        font-family: Arial, sans-serif;
        font-size: 1rem;
        font-weight: 700;
        color: white;
        letter-spacing: 0.08em;
      }

      .project-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 30px #006400, 
                    0 0 40px #006400, 
                    0 0 50px #006400;
      }

      /* ---------- PROJECTS PAGE BUTTONS ---------- */
    
      .projects-page-buttons {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 1.5rem;
        margin-bottom: 2rem;
      }

      .projects-page-button {
        font-family: Arial, sans-serif;
        font-size: 1rem;
        font-weight: 600;
        color: white;
        background: #006400;
        border: none;
        border-radius: 0.5rem;
        padding: 0.75rem 2rem;
        cursor: pointer;
        transition: transform 0.2s ease;
        text-decoration: none;
        display: inline-block;
      }

      .projects-page-button:hover {
        transform: translateY(-5px);
      }

      /* ---------- COPYRIGHT ---------- */
      
      .copyright {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 0.8rem;
        color: white;
        text-align: center;
        margin-top: 1rem;
        margin-bottom: 3rem;
        padding: 0 1rem;
      }

/* ───────────────────────────────────────────────── MEDIA QUERIES ────────────────────────────────────────────────── */

      /* ---------- 700px ---------- */
    
      @media screen and (max-width: 700px) {
        .projects-page-heading {
          font-size: 1.4rem;
          margin-bottom: 2rem;
        }

        .cards-row {
          flex-direction: column;
          align-items: center;
          width: 92%;
          gap: 2rem;
          margin-bottom: 2.5rem;
        }

        .project-card {
          width: 100%;
          flex: none;
        }

        .card-image-placeholder {
          height: 14rem;
        }

        .projects-page-buttons {
          gap: 1rem;
          margin-bottom: 2.5rem;
        }

        .projects-page-button {
          font-size: 0.95rem;
          padding: 0.7rem 1.5rem;
        }
        
        .projects-page-button:hover {
          transform: none;
        }
        
        .project-card:hover {
          transform: none;
          box-shadow: none;
        }
      }

      /* ---------- 468px ---------- */
    
      @media screen and (max-width: 468px) {
        .projects-page-heading {
          font-size: 1.15rem;
          margin-bottom: 1.5rem;
        }

        .cards-row {
          width: 95%;
          gap: 1.5rem;
          margin-bottom: 2rem;
        }

        .card-image-placeholder {
          height: 12rem;
        }

        .projects-page-buttons {
          flex-direction: column;
          gap: 0.9rem;
          margin-bottom: 2rem;
        }

        .projects-page-button {
          width: 80vw;
          text-align: center;
          font-size: 0.95rem;
          padding: 0.75rem 1rem;
        }
        
        .projects-page-button:hover {
          transform: none;
        }
        
        .project-card:hover {
          transform: none;
          box-shadow: none;
        }
      }
    </style>
  </head>
  
<!-- ──────────────────────────────────────────────────── BODY ───────────────────────────────────────────────────── -->
  
  <body>

<!-- ─────────────────────────────────────────────────── HEADER ──────────────────────────────────────────────────── -->
  
    <header class="site-header">
  
      <nav class="navbar">

        <!-- LOGO -->
    
        <div class="navbar-logo">
          <a href="index.html">
            <img src="logo-nazarite-digital-solutions.svg" alt="Nazarite Digital Solutions Logo">
          </a>
        </div>

      <!-- HAMBURGER -->
    
        <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>

      </nav>

      <!-- HAMBURGER DROP DOWN MENU -->
  
      <div class="mobile-menu" id="mobileMenu" role="navigation" aria-label="Mobile navigation">
        <a href="index.html">Home</a>
        <a href="index.html#about-page">About</a>
        <a href="projects-page.html">Projects</a>
        <a href="services-page.html">Services</a>
        <a href="contact-page.html">Contact</a>
      </div>
    
    </header>

    <script>
      const hamburger = document.getElementById('hamburger');
      const mobileMenu = document.getElementById('mobileMenu');

      hamburger.addEventListener('click', () => {
        const isOpen = hamburger.classList.toggle('is-open');
        hamburger.setAttribute('aria-expanded', isOpen);

        if (isOpen) {
          mobileMenu.classList.add('is-open');
        } else {
          mobileMenu.classList.remove('is-open');
        }
      });

      mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          hamburger.classList.remove('is-open');
          hamburger.setAttribute('aria-expanded', false);
          mobileMenu.classList.remove('is-open');
        });
      });

      document.addEventListener('click', (e) => {
        if (!hamburger.contains(e.target) && !mobileMenu.contains(e.target)) {
          hamburger.classList.remove('is-open');
          hamburger.setAttribute('aria-expanded', false);
          mobileMenu.classList.remove('is-open');
        }
      });
    </script>

<!-- ────────────────────────────────────────────────── PROJECTS PAGE ─────────────────────────────────────────────── -->

    <main class="projects-page-wrapper">

      <div class="projects-page-buttons">

      </div>

      <!-- COPYRIGHT -->
    
      <p class="copyright">&copy; 2026 Nazarite Digital Solutions. All Rights Reserved.</p>

    </main>

    <script defer src="/_vercel/speed-insights/script.js"></script>

  </body>
</html>
